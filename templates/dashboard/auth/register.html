<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h3 class="mb-4">Register</h3>

                    <div id="errorBox" class="alert alert-danger d-none"></div>
                    <div id="successBox" class="alert alert-success d-none"></div>

                    <form id="registerForm">
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" id="full_name" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" id="username" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" id="email" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Role</label>
                            <select id="role" class="form-select">
                                <option value="owner">Owner</option>
                                <option value="staff">Staff</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" id="password" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Confirm Password</label>
                            <input type="password" id="confirm_password" class="form-control" required>
                        </div>

                        <button type="submit" class="btn btn-dark w-100">Register</button>
                    </form>

                    <p class="mt-3 mb-0">
                        Already have an account?
                        <a href="/dashboard/login/">Login</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const registerForm = document.getElementById("registerForm");
    const errorBox = document.getElementById("errorBox");
    const successBox = document.getElementById("successBox");

    registerForm.addEventListener("submit", async function(e) {
        e.preventDefault();

        errorBox.classList.add("d-none");
        successBox.classList.add("d-none");

        const payload = {
            full_name: document.getElementById("full_name").value,
            username: document.getElementById("username").value,
            email: document.getElementById("email").value,
            role: document.getElementById("role").value,
            password: document.getElementById("password").value,
            confirm_password: document.getElementById("confirm_password").value
        };

        try {
            const response = await fetch("/api/auth/register/", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(payload)
            });

            const result = await response.json();

            if (response.ok) {
                successBox.classList.remove("d-none");
                successBox.innerText = "Registration successful. Redirecting to login...";
                setTimeout(() => {
                    window.location.href = "/dashboard/login/";
                }, 1200);
            } else {
                errorBox.classList.remove("d-none");
                errorBox.innerText = result.message || JSON.stringify(result.errors || result);
            }
        } catch (error) {
            errorBox.classList.remove("d-none");
            errorBox.innerText = "Registration failed.";
        }
    });
</script>
</body>
</html>
