{% extends "dashboard/base_dashboard.html" %}
{% block title %}Leads{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center page-header">
    <div>
        <h2>Leads</h2>
        <p class="text-muted mb-0">Manage prospect leads.</p>
    </div>
    <button class="btn btn-dark" data-bs-toggle="modal" data-bs-target="#leadModal">Add Lead</button>
</div>

<div id="leadMessageBox"></div>

<div class="card">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-bordered align-middle">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Company</th>
                        <th>Job Title</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="leadTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="leadModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5>Add Lead</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="leadForm">
                    <div class="row g-3">
                        <div class="col-md-6"><input type="text" id="first_name" class="form-control" placeholder="First Name" required></div>
                        <div class="col-md-6"><input type="text" id="last_name" class="form-control" placeholder="Last Name"></div>
                        <div class="col-md-6"><input type="email" id="email" class="form-control" placeholder="Email" required></div>
                        <div class="col-md-6"><input type="text" id="phone" class="form-control" placeholder="Phone"></div>
                        <div class="col-md-6"><input type="text" id="company_name" class="form-control" placeholder="Company Name" required></div>
                        <div class="col-md-6"><input type="url" id="company_website" class="form-control" placeholder="Company Website"></div>
                        <div class="col-md-6"><input type="text" id="industry" class="form-control" placeholder="Industry"></div>
                        <div class="col-md-6"><input type="text" id="job_title" class="form-control" placeholder="Job Title"></div>
                        <div class="col-md-6">
                            <select id="status" class="form-select">
                                <option value="new">New</option>
                                <option value="contacted">Contacted</option>
                                <option value="replied">Replied</option>
                                <option value="interested">Interested</option>
                                <option value="not_interested">Not Interested</option>
                                <option value="meeting_booked">Meeting Booked</option>
                                <option value="closed">Closed</option>
                            </select>
                        </div>
                        <div class="col-md-12">
                            <textarea id="notes" class="form-control" rows="3" placeholder="Notes"></textarea>
                        </div>
                        <div class="col-md-12">
                            <input type="text" id="tag_names" class="form-control" placeholder="Tags separated by comma">
                        </div>
                    </div>
                    <button class="btn btn-dark mt-3" type="submit">Save Lead</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    redirectIfNoToken();

    function showLeadMessage(type, text) {
        document.getElementById("leadMessageBox").innerHTML = `<div class="alert alert-${type}">${text}</div>`;
    }

    async function loadLeads() {
        const res = await fetch("/api/leads/list/", {headers: authHeaders()});
        const result = await res.json();
        const tbody = document.getElementById("leadTableBody");
        tbody.innerHTML = "";

        if (res.ok && result.data.length) {
            result.data.forEach(item => {
                tbody.innerHTML += `
                    <tr>
                        <td>${item.full_name}</td>
                        <td>${item.email}</td>
                        <td>${item.company_name}</td>
                        <td>${item.job_title || ""}</td>
                        <td>${item.status}</td>
                    </tr>
                `;
            });
        } else {
            tbody.innerHTML = `<tr><td colspan="5">No leads found.</td></tr>`;
        }
    }

    document.getElementById("leadForm").addEventListener("submit", async function(e) {
        e.preventDefault();

        const tags = document.getElementById("tag_names").value
            .split(",")
            .map(x => x.trim())
            .filter(Boolean);

        const payload = {
            first_name: document.getElementById("first_name").value,
            last_name: document.getElementById("last_name").value,
            email: document.getElementById("email").value,
            phone: document.getElementById("phone").value,
            company_name: document.getElementById("company_name").value,
            company_website: document.getElementById("company_website").value,
            industry: document.getElementById("industry").value,
            job_title: document.getElementById("job_title").value,
            status: document.getElementById("status").value,
            notes: document.getElementById("notes").value,
            tag_names: tags
        };

        const res = await fetch("/api/leads/create/", {
            method: "POST",
            headers: authHeaders(),
            body: JSON.stringify(payload)
        });

        const result = await res.json();

        if (res.ok) {
            showLeadMessage("success", result.message || "Lead created successfully.");
            document.getElementById("leadForm").reset();
            bootstrap.Modal.getInstance(document.getElementById("leadModal")).hide();
            loadLeads();
        } else {
            showLeadMessage("danger", result.message || JSON.stringify(result.errors || result));
        }
    });

    loadLeads();
</script>
{% endblock %}
